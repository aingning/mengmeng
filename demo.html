<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>LOVE 梦</title>

<style>
html, body {
  height: 100%;
  padding: 0;
  margin: 0;
  background: #000;
  overflow: hidden;
  touch-action: none; /* 防止iOS双击缩放 */
}
canvas {
  position: absolute;
  width: 100%;
  height: 100%;
  z-index: 1;
}
/* 音乐控制按钮优化 - 增大触控区域 */
#music-control {
  position: fixed;
  bottom: 30px;
  right: 30px;
  z-index: 999;
  width: 50px;
  height: 50px;
  background: rgba(234, 128, 176, 0.3);
  border: 2px solid #ea80b0;
  border-radius: 50%;
  color: #ea80b0;
  font-size: 24px;
  line-height: 46px;
  text-align: center;
  cursor: pointer;
  transition: all 0.3s;
  -webkit-tap-highlight-color: transparent; /* 移除移动端点击高亮 */
  user-select: none;
}
#music-control:active {
  transform: scale(0.95);
}
#music-control.playing {
  animation: rotate 3s linear infinite;
}
@keyframes rotate {
  from { transform: rotate(0deg); }
  to { transform: rotate(360deg); }
}
/* 首次点击提示 */
#play-hint {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  color: #ea80b0;
  font-size: 18px;
  z-index: 998;
  background: rgba(0,0,0,0.7);
  padding: 15px 30px;
  border-radius: 25px;
  border: 1px solid #ea80b0;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.5s;
}
</style>
</head>
<body>

<canvas id="pinkboard"></canvas>

<!-- 优化后的音频标签 -->
<audio id="bg-music" loop preload="metadata" playsinline webkit-playsinline x5-playsinline>
  <!-- 必须转换为MP3格式，文件名改为 mengmeng.mp3 -->
  <source src="mengmeng.mp3" type="audio/mpeg">
  <!-- 提供ogg备选格式兼容旧版安卓 -->
  <source src="mengmeng.ogg" type="audio/ogg">
  <!-- 再提供一个低码率版本给移动网络 -->
  <source src="mengmeng-mobile.mp3" type="audio/mpeg">
</audio>

<!-- 首次播放提示 -->
<div id="play-hint">点击任意处开启音乐 ♪</div>

<!-- 音乐控制按钮 -->
<div id="music-control" onclick="toggleMusic(event)">♪</div>

<script>
/*
 * Settings
 */
var settings = {
  particles: {
    length:   500,
    duration:   2,
    velocity: 100,
    effect: -0.75,
    size:      30,
  },
};

(function(){var b=0;var c=["ms","moz","webkit","o"];for(var a=0;a<c.length&&!window.requestAnimationFrame;++a){window.requestAnimationFrame=window[c[a]+"RequestAnimationFrame"];window.cancelAnimationFrame=window[c[a]+"CancelAnimationFrame"]||window[c[a]+"CancelRequestAnimationFrame"]}if(!window.requestAnimationFrame){window.requestAnimationFrame=function(h,e){var d=new Date().getTime();var f=Math.max(0,16-(d-b));var g=window.setTimeout(function(){h(d+f)},f);b=d+f;return g}}if(!window.cancelAnimationFrame){window.cancelAnimationFrame=function(d){clearTimeout(d)}}}());

var Point = (function() {
  function Point(x, y) {
    this.x = (typeof x !== 'undefined') ? x : 0;
    this.y = (typeof y !== 'undefined') ? y : 0;
  }
  Point.prototype.clone = function() {
    return new Point(this.x, this.y);
  };
  Point.prototype.length = function(length) {
    if (typeof length == 'undefined')
      return Math.sqrt(this.x * this.x + this.y * this.y);
    this.normalize();
    this.x *= length;
    this.y *= length;
    return this;
  };
  Point.prototype.normalize = function() {
    var length = this.length();
    this.x /= length;
    this.y /= length;
    return this;
  };
  return Point;
})();

var Particle = (function() {
  function Particle() {
    this.position = new Point();
    this.velocity = new Point();
    this.acceleration = new Point();
    this.age = 0;
  }
  Particle.prototype.initialize = function(x, y, dx, dy) {
    this.position.x = x;
    this.position.y = y;
    this.velocity.x = dx;
    this.velocity.y = dy;
    this.acceleration.x = dx * settings.particles.effect;
    this.acceleration.y = dy * settings.particles.effect;
    this.age = 0;
  };
  Particle.prototype.update = function(deltaTime) {
    this.position.x += this.velocity.x * deltaTime;
    this.position.y += this.velocity.y * deltaTime;
    this.velocity.x += this.acceleration.x * deltaTime;
    this.velocity.y += this.acceleration.y * deltaTime;
    this.age += deltaTime;
  };
  Particle.prototype.draw = function(context, image) {
    function ease(t) {
      return (--t) * t * t + 1;
    }
    var size = image.width * ease(this.age / settings.particles.duration);
    context.globalAlpha = 1 - this.age / settings.particles.duration;
    context.drawImage(image, this.position.x - size / 2, this.position.y - size / 2, size, size);
  };
  return Particle;
})();

var ParticlePool = (function() {
  var particles,
      firstActive = 0,
      firstFree   = 0,
      duration    = settings.particles.duration;
  
  function ParticlePool(length) {
    particles = new Array(length);
    for (var i = 0; i < particles.length; i++)
      particles[i] = new Particle();
  }
  ParticlePool.prototype.add = function(x, y, dx, dy) {
    particles[firstFree].initialize(x, y, dx, dy);
    firstFree++;
    if (firstFree   == particles.length) firstFree   = 0;
    if (firstActive == firstFree       ) firstActive++;
    if (firstActive == particles.length) firstActive = 0;
  };
  ParticlePool.prototype.update = function(deltaTime) {
    var i;
    if (firstActive < firstFree) {
      for (i = firstActive; i < firstFree; i++)
        particles[i].update(deltaTime);
    }
    if (firstFree < firstActive) {
      for (i = firstActive; i < particles.length; i++)
        particles[i].update(deltaTime);
      for (i = 0; i < firstFree; i++)
        particles[i].update(deltaTime);
    }
    while (particles[firstActive].age >= duration && firstActive != firstFree) {
      firstActive++;
      if (firstActive == particles.length) firstActive = 0;
    }
  };
  ParticlePool.prototype.draw = function(context, image) {
    if (firstActive < firstFree) {
      for (i = firstActive; i < firstFree; i++)
        particles[i].draw(context, image);
    }
    if (firstFree < firstActive) {
      for (i = firstActive; i < particles.length; i++)
        particles[i].draw(context, image);
      for (i = 0; i < firstFree; i++)
        particles[i].draw(context, image);
    }
  };
  return ParticlePool;
})();

(function(canvas) {
  var context = canvas.getContext('2d'),
      particles = new ParticlePool(settings.particles.length),
      particleRate = settings.particles.length / settings.particles.duration,
      time;
  
  function pointOnHeart(t) {
    return new Point(
      240 * Math.pow(Math.sin(t), 3),
      195 * Math.cos(t) - 75 * Math.cos(2 * t) - 30 * Math.cos(3 * t) - 15 * Math.cos(4 * t) + 37.5
    );
  }
  
  var image = (function() {
    var canvas  = document.createElement('canvas'),
        context = canvas.getContext('2d');
    canvas.width  = settings.particles.size;
    canvas.height = settings.particles.size;
    function to(t) {
      var point = pointOnHeart(t);
      point.x = settings.particles.size / 2 + point.x * settings.particles.size / 525;
      point.y = settings.particles.size / 2 - point.y * settings.particles.size / 525;
      return point;
    }
    context.beginPath();
    var t = -Math.PI;
    var point = to(t);
    context.moveTo(point.x, point.y);
    while (t < Math.PI) {
      t += 0.01;
      point = to(t);
      context.lineTo(point.x, point.y);
    }
    context.closePath();
    context.fillStyle = '#ea80b0';
    context.fill();
    var image = new Image();
    image.src = canvas.toDataURL();
    return image;
  })();
  
  function render() {
    requestAnimationFrame(render);
    var newTime   = new Date().getTime() / 1000,
        deltaTime = newTime - (time || newTime);
    time = newTime;
    context.clearRect(0, 0, canvas.width, canvas.height);
    var amount = particleRate * deltaTime;
    for (var i = 0; i < amount; i++) {
      var pos = pointOnHeart(Math.PI - 2 * Math.PI * Math.random());
      var dir = pos.clone().length(settings.particles.velocity);
      particles.add(canvas.width / 2 + pos.x, canvas.height / 2 - pos.y, dir.x, -dir.y);
    }
    particles.update(deltaTime);
    particles.draw(context, image);
    
    var fontSize = Math.min(canvas.width, canvas.height) / 6;
    context.font = 'bold ' + fontSize + 'px Arial';
    context.textAlign = 'center';
    context.textBaseline = 'middle';
    context.shadowColor = '#ea80b0';
    context.shadowBlur = 20;
    context.fillStyle = '#fff';
    context.fillText('梦梦', canvas.width / 2, canvas.height / 2);
    context.shadowBlur = 0;
    context.strokeStyle = '#ea80b0';
    context.lineWidth = 3;
    context.strokeText('梦梦', canvas.width / 2, canvas.height / 2);
  }
  
  function onResize() {
    canvas.width  = canvas.clientWidth;
    canvas.height = canvas.clientHeight;
  }
  window.onresize = onResize;
  
  setTimeout(function() {
    onResize();
    render();
  }, 10);
})(document.getElementById('pinkboard'));

// ========== 优化后的音乐控制逻辑 ==========
var music = document.getElementById('bg-music');
var musicBtn = document.getElementById('music-control');
var playHint = document.getElementById('play-hint');
var isPlaying = false;
var hasInteracted = false;

// iOS/安卓兼容性播放函数
function playAudio() {
  // 对于iOS，必须先解除静音状态
  music.muted = false;
  
  var playPromise = music.play();
  
  if (playPromise !== undefined) {
    playPromise.then(function() {
      musicBtn.classList.add('playing');
      musicBtn.innerHTML = '♫';
      isPlaying = true;
      playHint.style.opacity = '0';
    }).catch(function(error) {
      console.log('播放失败:', error);
      isPlaying = false;
      // 显示提示让用户点击
      playHint.style.opacity = '1';
      setTimeout(function() {
        playHint.style.opacity = '0';
      }, 3000);
    });
  }
}

function pauseAudio() {
  music.pause();
  musicBtn.classList.remove('playing');
  musicBtn.innerHTML = '♪';
  isPlaying = false;
}

function toggleMusic(e) {
  if(e) e.stopPropagation(); // 防止冒泡触发body点击
  
  if (isPlaying) {
    pauseAudio();
  } else {
    playAudio();
  }
}

// 页面首次交互处理（解决iOS自动播放限制）
function handleFirstInteraction() {
  if (!hasInteracted) {
    hasInteracted = true;
    // iOS需要首次交互后才能播放
    playAudio();
  }
}

// 监听多种用户交互事件（提高兼容性）
['touchstart', 'click', 'touchend'].forEach(function(event) {
  document.body.addEventListener(event, handleFirstInteraction, {once: true});
});

// 音频加载错误处理
music.addEventListener('error', function(e) {
  console.error('音频加载失败:', e);
  musicBtn.style.display = 'none';
  alert('背景音乐加载失败，请检查文件格式是否为MP3');
});

// 监听音频结束（虽然设置了loop，但某些浏览器可能不兼容）
music.addEventListener('ended', function() {
  this.currentTime = 0;
  this.play();
}, false);

// 页面可见性变化处理（切换标签页暂停，返回继续）
document.addEventListener('visibilitychange', function() {
  if (document.hidden) {
    if (isPlaying) music.pause();
  } else {
    if (isPlaying) playAudio();
  }
});
</script>

</body>
</html>
